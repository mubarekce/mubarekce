<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mübarekçe Pro+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              emerald: {
                premium: '#0d1220',
                light: '#faf6f0',
              },
              gold: {
                accent: '#c9a668',
              },
              sanctuary: {
                50: '#faf6f0',
                100: '#f2ead9',
                200: '#e5d6b8',
                800: '#141a2c',
                900: '#0d1220',
                950: '#080b14',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Naskh+Arabic:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
          --emerald-premium: #0d1220;
          --emerald-light: #faf6f0;
          --gold-accent: #c9a668;
        }
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background: #faf6f0;
          color: #1c1a14;
          -webkit-tap-highlight-color: transparent;
          transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
          background: #0d1220;
          color: #f3ede0;
        }
        .serif-text {
          font-family: 'Playfair Display', serif;
        }
        .arabic-text {
          font-family: 'Amiri', 'Noto Naskh Arabic', serif;
          direction: rtl;
          line-height: 1.6;
        }
        .glass-panel { 
          background: rgba(250, 246, 240, 0.75); 
          backdrop-filter: blur(16px); 
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(201, 166, 104, 0.15);
        }
        .dark .glass-panel {
          background: rgba(20, 26, 44, 0.8);
          border: 1px solid rgba(201, 166, 104, 0.08);
        }
        .premium-shadow {
          box-shadow: 0 20px 50px -12px rgba(13, 18, 32, 0.12);
        }
        .dark .premium-shadow {
          box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .active-glow {
          box-shadow: 0 0 15px rgba(201, 166, 104, 0.35);
        }
        ::-webkit-scrollbar {
          width: 0px;
        }
        .mask-fade {
          mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }
        @keyframes subtle-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(1.02); }
        }
        .animate-subtle {
          animation: subtle-pulse 4s infinite ease-in-out;
        }
        /* Custom transitions for dark mode */
        * {
          transition-property: background-color, border-color, color, fill, stroke;
          transition-duration: 200ms;
        }
        /* Leaflet popup customization */
        .leaflet-popup-content-wrapper {
          border-radius: 1.5rem;
          padding: 0.5rem;
          box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .leaflet-popup-tip {
          background: white;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.25.0",
    "leaflet": "https://esm.sh/leaflet@^1.9.4",
    "leaflet/": "https://esm.sh/leaflet@^1.9.4/",
    "react-leaflet": "https://esm.sh/react-leaflet@^5.0.0"
  }
}
</script>
</head>
<body class="bg-[#faf6f0] dark:bg-[#0d1220]">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
