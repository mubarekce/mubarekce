<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mübarekçe Pro+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              emerald: {
                premium: '#0a1f1a',
                light: '#f3f7e9',
              },
              gold: {
                accent: '#c9a668',
                50: '#fbf6ea',
                100: '#f5ead0',
                200: '#e9d4a0',
                300: '#dcbe74',
                400: '#d1ac57',
                500: '#c9a668',
                600: '#a8895a',
                700: '#8a6f45',
                800: '#6b5636',
                900: '#4a3b26',
              },
              navy: {
                50: '#eef3f0',
                100: '#cfe0d8',
                200: '#a3c7ba',
                300: '#74ab99',
                400: '#3d8071',
                500: '#256054',
                600: '#1c4b42',
                700: '#153a33',
                800: '#0f2b26',
                900: '#0a1f1a',
                950: '#04120d',
              },
              sage: {
                50: '#f3f7e9',
                100: '#e6f0d3',
                200: '#d2e2ac',
                300: '#b9d17e',
                400: '#9dbb63',
                500: '#84a34c',
                600: '#6b8a3c',
                700: '#54702e',
                800: '#405422',
                900: '#2e3d18',
              },
              sanctuary: {
                50: '#f3f7e9',

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Naskh+Arabic:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
          --emerald-premium: #0a1f1a;
          --emerald-light: #f3f7e9;
          --gold-accent: #c9a668;
        }
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          background: #f3f7e9;
          color: #1c1a14;
          -webkit-tap-highlight-color: transparent;
          transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
          background: #0a1f1a;
          color: #eef6ee;
        }
        .serif-text {
          font-family: 'Playfair Display', serif;
        }
        .arabic-text {
          font-family: 'Amiri', 'Noto Naskh Arabic', serif;
          direction: rtl;
          line-height: 1.6;
        }
        .glass-panel { 
          background: rgba(250, 246, 240, 0.75); 
          backdrop-filter: blur(16px); 
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(201, 166, 104, 0.15);
        }
        .dark .glass-panel {
          background: rgba(20, 26, 44, 0.8);
          border: 1px solid rgba(201, 166, 104, 0.08);
        }
        .premium-shadow {
          box-shadow: 0 20px 50px -12px rgba(13, 18, 32, 0.12);
        }
        .dark .premium-shadow {
          box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .active-glow {
          box-shadow: 0 0 15px rgba(201, 166, 104, 0.35);
        }
        ::-webkit-scrollbar {
          width: 0px;
        }
        .mask-fade {
          mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }
        @keyframes subtle-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(1.02); }
        }
        .animate-subtle {
          animation: subtle-pulse 4s infinite ease-in-out;
        }
        /* Arkaplandaki hafif hareketli cami silüeti - manevi, huzurlu bir derinlik hissi için */
        @keyframes mosque-drift {
          0%   { transform: translateX(0px) scale(1);       opacity: 0.5; }
          50%  { transform: translateX(10px) scale(1.015);   opacity: 0.75; }
          100% { transform: translateX(0px) scale(1);        opacity: 0.5; }
        }
        .mosque-silhouette {
          animation: mosque-drift 18s infinite ease-in-out;
          will-change: transform, opacity;
        }
        @media (prefers-reduced-motion: reduce) {
          .mosque-silhouette { animation: none; }
        }
        /* Custom transitions for dark mode */
        * {
          transition-property: background-color, border-color, color, fill, stroke;
          transition-duration: 200ms;
        }
        /* Tema ile uyumlu varsayılan buton görünümü (özel Tailwind sınıfı olmayan butonlar için) */
        button {
          font-family: 'Plus Jakarta Sans', sans-serif;
        }
        button:focus-visible {
          outline: 2px solid #c9a668;
          outline-offset: 2px;
        }
        /* Leaflet popup customization */
        .leaflet-popup-content-wrapper {
          border-radius: 1.5rem;
          padding: 0.5rem;
          box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .leaflet-popup-tip {
          background: white;
        }
    </style>

}
